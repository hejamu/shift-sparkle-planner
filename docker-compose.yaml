version: '3.8'
services:
  frontend:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - PORT=3001
    ports:
      - "3001:3001"
    restart: unless-stopped
    volumes:
      - sqlite_data:/data
volumes:
  sqlite_data:
