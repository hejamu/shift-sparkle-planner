name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check (frontend)
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Type-check (backend)
        run: npx tsc -p tsconfig.backend.json --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true # lint baseline still has pre-existing issues; surface them without failing CI

      - name: Test
        run: npm test -- --run

      - name: Build (frontend)
        run: npm run build

      - name: Build (backend)
        run: npx tsc -p tsconfig.backend.json && test -f dist/server/api.js

  # Build and push images to GHCR. Only runs on pushes to main (not PRs from
  # forks, which can't push), and only after build-and-test passes. Each image
  # is tagged with the commit SHA and `latest` so deploys can pull a specific
  # version or follow main.
  publish-images:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image base
        id: img
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.base }}-frontend:${{ github.sha }}
            ${{ steps.img.outputs.base }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ steps.img.outputs.base }}-backend:${{ github.sha }}
            ${{ steps.img.outputs.base }}-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
